name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Flutter Web
        run: |
          cd flutter_web
          flutter config --enable-web
          flutter pub get
          # Projeto: base em /myportfolio/; se for site de usuário (.github.io), use /
          BASE_HREF="/${{ github.event.repository.name }}/"
          flutter build web --release --base-href "$BASE_HREF"

      - name: Verificar index.html
        run: |
          ls -la flutter_web/build/web/
          test -f flutter_web/build/web/index.html || (echo "ERRO: index.html não encontrado" && exit 1)

      - name: Copiar site para raiz do artefato
        run: |
          cp -r flutter_web/build/web _site

      - uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
