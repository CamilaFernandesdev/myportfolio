# Deploy Flutter Web para a branch gh-pages (para usar "Deploy from a branch")
name: Deploy Flutter Web to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # permite rodar o deploy manualmente em Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # necessário para fazer push na gh-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Build Flutter Web
        run: |
          cd flutter_web
          flutter pub get
          flutter build web --release --web-renderer html --base-href /${{ github.event.repository.name }}/
        env:
          CI: true

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: flutter_web/build/web
          force_orphan: true
