name: Dart

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          cd flutter_web
          flutter pub get

      - name: Analyze project source
        run: |
          cd flutter_web
          flutter analyze

      - name: Run tests
        run: |
          cd flutter_web
          flutter test
